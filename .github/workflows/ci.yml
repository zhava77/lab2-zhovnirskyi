name: CI/CD Pipeline
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
 
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build artifact
        run: |
          mkdir -p dist
          echo "Build: ${{ github.sha }}" > dist/build-info.txt
          echo "Date: $(date -u)" >> dist/build-info.txt
          cp -r src/ dist/src/
          cd dist && zip -r ../app-build.zip . && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app-build.zip
          retention-days: 5
 
  deploy_staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with: { name: app-build }
      - name: Deploy to staging
        run: |
          echo "=== Deploying to STAGING ==="
          unzip app-build.zip -d staging-deploy
          cat staging-deploy/build-info.txt
          echo "=== Staging deployment complete ==="
 
  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Run smoke tests
        run: |
          python -c "
          assert 1 == 1, 'Health check failed'
          print('Smoke test 1: PASSED')
          from src.event import Event, EventBus
          bus = EventBus()
          bus.publish(Event('test', {'k': 'v'}))
          assert len(bus.get_history()) == 1
          print('Smoke test 2: PASSED')
          "
 
  deploy_production:
    runs-on: ubuntu-latest
    needs: verify_staging
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with: { name: app-build }
      - name: Deploy to production
        run: |
          echo "=== Deploying to PRODUCTION ==="
          unzip app-build.zip -d production-deploy
          cat production-deploy/build-info.txt
          echo "=== Production deployment complete ==="
